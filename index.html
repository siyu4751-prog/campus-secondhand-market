<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Campus Market 校园二手交易平台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-header">
        <nav class="navbar">
            <div class="logo">Campus Market</div>
            <div class="nav-links">
                <a href="#home">首页</a>
                <a href="#publish">发布商品</a>
                <a href="#products">商品列表</a>
                <a href="#about">关于平台</a>
            </div>
        </nav>

        <section id="home" class="hero">
            <h1>校园闲置物品交易平台</h1>
            <p>让教材、数码、生活用品重新流通，让校园生活更省钱、更便利。</p>
            <a href="#publish" class="hero-btn">立即发布商品</a>
        </section>
    </header>

    <main>
        <section class="stats-section">
            <div class="stat-card">
                <h3 id="totalCount">0</h3>
                <p>商品总数</p>
            </div>
            <div class="stat-card">
                <h3 id="availableCount">0</h3>
                <p>正在出售</p>
            </div>
            <div class="stat-card">
                <h3 id="soldCount">0</h3>
                <p>已售出</p>
            </div>
        </section>

        <section class="search-section">
            <input type="text" id="searchInput" placeholder="搜索商品，例如：教材、耳机、自行车">

            <select id="categoryFilter">
                <option value="全部">全部分类</option>
                <option value="教材资料">教材资料</option>
                <option value="数码产品">数码产品</option>
                <option value="生活用品">生活用品</option>
                <option value="服装鞋包">服装鞋包</option>
                <option value="运动器材">运动器材</option>
                <option value="其他">其他</option>
            </select>

            <select id="statusFilter">
                <option value="全部">全部状态</option>
                <option value="出售中">出售中</option>
                <option value="已售出">已售出</option>
            </select>
        </section>

        <section id="publish" class="form-section">
            <h2>发布二手商品</h2>

            <div class="form-box">
                <input type="text" id="nameInput" placeholder="商品名称">
                <input type="number" id="priceInput" placeholder="价格，例如：20">

                <select id="categoryInput">
                    <option value="教材资料">教材资料</option>
                    <option value="数码产品">数码产品</option>
                    <option value="生活用品">生活用品</option>
                    <option value="服装鞋包">服装鞋包</option>
                    <option value="运动器材">运动器材</option>
                    <option value="其他">其他</option>
                </select>

                <input type="text" id="conditionInput" placeholder="新旧程度，例如：八成新">
                <input type="text" id="contactInput" placeholder="联系方式，例如：微信 xxx">
                <textarea id="descInput" placeholder="商品描述，例如：购买时间、使用情况、转让原因"></textarea>

                <button onclick="addProduct()">发布商品</button>
            </div>
        </section>

        <section id="products" class="product-section">
            <div class="section-title-row">
                <h2>二手商品列表</h2>
                <button class="clear-btn" onclick="clearAllProducts()">清空全部商品</button>
            </div>

            <div id="productList" class="product-list"></div>
        </section>

        <section id="about" class="about-section">
            <h2>关于平台</h2>
            <p>
                Campus Market 是一个面向校园学生群体的二手交易平台，支持学生发布、浏览、搜索、筛选和管理二手商品信息。
                本项目使用 HTML、CSS 和 JavaScript 开发，并通过 localStorage 实现本地数据保存。
            </p>
        </section>
    </main>

    <footer>
        <p>Campus Market © 2026 校园二手交易平台</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
